stages:
  - build
  - docs
  - deploy

build:wheel:
  stage: build
  tags:
    - linux
  variables:
    RUSTUP_HOME: C:\Users\vigop\.rustup
    CARGO_HOME: C:\Users\vigop\.cargo
  script:
    - $env:Path += ";C:\Users\vigop\.cargo\bin;C:\Users\vigop\.local\bin"
    - cd python
    - uv tool run maturin build --release
  artifacts:
    paths:
      - target/wheels/*.whl
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

release:
  stage: deploy
  tags:
    - linux
  needs:
    - build:wheel
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      $body = @{
        tag_name    = $env:CI_COMMIT_TAG
        name        = "BinaryOptionsToolsV2 $($env:CI_COMMIT_TAG)"
        description = "Release $($env:CI_COMMIT_TAG). Windows wheel built by CI is attached."
        assets      = @{ links = @(
          @{ name = "Python wheel (win_amd64)"
             url  = "$($env:CI_PROJECT_URL)/-/jobs/artifacts/$($env:CI_COMMIT_TAG)/download?job=build:wheel" }
        ) }
      } | ConvertTo-Json -Depth 5
      $r = Invoke-RestMethod -Method Post -Uri "$($env:CI_API_V4_URL)/projects/$($env:CI_PROJECT_ID)/releases" -Headers @{ 'JOB-TOKEN' = $env:CI_JOB_TOKEN } -ContentType 'application/json' -Body $body
      Write-Output "Created release: $($r.name)"

pages:
  stage: docs
  image: node:20-bookworm
  tags:
    - linux
  variables:
    HUSKY: "0"
  before_script:
    - cd docs-site
    - npm ci
  script:
    - npm run build
    - cd ..
    - Move-Item -Force docs-site/build public
  artifacts:
    paths:
      - public
    expire_in: 7 days
  only:
    - main
    - master
  dependencies: []

deploy:
  stage: deploy
  image: node:20-bookworm
  tags:
    - linux
  script:
    - echo "Deploy to GitLab Pages/"
  environment:
    name: production
    url: https://chipatrade.gitlab.io/chipadevorg/BinaryOptionsTools-v2/
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  dependencies:
    - pages
