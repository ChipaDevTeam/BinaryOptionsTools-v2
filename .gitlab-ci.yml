stages:
  - build
  - docs
  - deploy

build:wheel:
  stage: build
  tags:
    - linux
  script:
    - $env:Path += ";C:\Users\vigop\.cargo\bin;C:\Users\vigop\.local\bin"
    - cd python
    - uv tool run maturin build --release
  artifacts:
    paths:
      - target/wheels/*.whl
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

pages:
  stage: docs
  image: node:20-bookworm
  tags:
    - linux
  variables:
    HUSKY: "0"
  before_script:
    - cd docs-site
    - npm ci
  script:
    - npm run build
    - cd ..
    - Move-Item -Force docs-site/build public
  artifacts:
    paths:
      - public
    expire_in: 7 days
  only:
    - main
    - master
  dependencies: []

deploy:
  stage: deploy
  image: node:20-bookworm
  tags:
    - linux
  script:
    - echo "Deploy to GitLab Pages/"
  environment:
    name: production
    url: https://chipatrade.gitlab.io/chipadevorg/BinaryOptionsTools-v2/
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  dependencies:
    - pages
