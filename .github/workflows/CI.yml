name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: x86_64
          - target: x86
          - target: aarch64
          - target: armv7
          - target: s390x
          - target: ppc64le
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: 2_28
          working-directory: BinaryOptionsToolsV2
          zig: true
        env:
          CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
          CFLAGS_armv7_unknown_linux_gnueabihf: "-D__ARM_ARCH=7"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: BinaryOptionsToolsV2/dist

      - name: pytest (Native x86_64)
        if: ${{ matrix.platform.target == 'x86_64' }}
        shell: bash
        working-directory: BinaryOptionsToolsV2
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --find-links dist --only-binary=:all: BinaryOptionsToolsV2
          pip install pytest pytest-asyncio
          mkdir -p test_run && cd test_run
          pytest ../../tests

      - name: pytest (Emulated Arch)
        if: ${{ matrix.platform.target != 'x86_64' && matrix.platform.target != 'x86' }}
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.platform.target }}
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y --no-install-recommends python3 python3-pip python3-venv
            pip3 install -U pip pytest pytest-asyncio
          run: |
            set -e
            cd BinaryOptionsToolsV2
            python3 -m venv .venv
            source .venv/bin/activate
            pip3 install --find-links dist --only-binary=:all: BinaryOptionsToolsV2
            mkdir -p test_run && cd test_run
            pytest ../../tests

  musllinux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: x86_64
          - target: x86
          - target: aarch64
          - target: armv7
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
          working-directory: BinaryOptionsToolsV2
          zig: true
        env:
          CFLAGS_aarch64_unknown_linux_musl: "-D__ARM_ARCH=8"
          CFLAGS_armv7_unknown_linux_musleabihf: "-D__ARM_ARCH=7"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: BinaryOptionsToolsV2/dist

      - name: pytest (Native Alpine)
        if: ${{ matrix.platform.target == 'x86_64' }}
        shell: bash
        run: |
          docker run --rm -v ${{ github.workspace }}:/io -w /io/BinaryOptionsToolsV2 alpine:latest sh -c '
            set -e
            apk add py3-pip python3-dev
            python3 -m venv .venv
            . .venv/bin/activate
            pip install --find-links dist --only-binary=:all: BinaryOptionsToolsV2
            pip install pytest pytest-asyncio
            mkdir -p test_run && cd test_run
            pytest ../../tests
          '

      - name: pytest (Emulated Alpine)
        if: ${{ matrix.platform.target != 'x86_64' && matrix.platform.target != 'x86' }}
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.platform.target }}
          distro: alpine_latest
          githubToken: ${{ github.token }}
          install: |
            apk add py3-pip python3-dev build-base
          run: |
            set -e
            cd BinaryOptionsToolsV2
            python3 -m venv .venv
            . .venv/bin/activate
            pip install pytest pytest-asyncio
            pip install --find-links dist --only-binary=:all: BinaryOptionsToolsV2
            mkdir -p test_run && cd test_run
            pytest ../../tests

  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: x64
          - target: x86
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          working-directory: BinaryOptionsToolsV2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.platform.target }}

      - name: Build wheels (3.13)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.13
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          working-directory: BinaryOptionsToolsV2

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: BinaryOptionsToolsV2/dist

      - name: pytest
        shell: bash
        working-directory: BinaryOptionsToolsV2
        run: |
          set -e
          python -m venv .venv
          source .venv/Scripts/activate
          pip install --find-links dist --only-binary=:all: BinaryOptionsToolsV2
          pip install pytest pytest-asyncio
          mkdir -p test_run && cd test_run
          pytest ../../tests

  macos:
    runs-on: macos-15-intel
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          working-directory: BinaryOptionsToolsV2

  sdist:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: BinaryOptionsToolsV2
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: BinaryOptionsToolsV2/dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, musllinux, windows, macos, sdist]
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: wheels

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "wheels/wheels-*/*"

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: wheels/wheels-*/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          fail_on_unmatched_files: false
          body: |
            ## BinaryOptionsToolsV2 Release ${{ github.ref_name }}
            Pre-built wheels for Python 3.8+ (abi3) and Source Distribution.
