name: CI
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- 1. LINUX BUILD ---
  linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64, armv7]
        libc: [manylinux_2_28, musllinux_1_1]
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # --zig is the modern way to cross-compile for GLIBC/MUSL without Docker
          args: --release --out dist -i python3.13 --zig
          manylinux: off
          working-directory: BinaryOptionsToolsV2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.libc }}
          path: BinaryOptionsToolsV2/dist

  # --- 2. WINDOWS BUILD ---
  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x64, x86]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.13
          working-directory: BinaryOptionsToolsV2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: BinaryOptionsToolsV2/dist

  # --- 3. MACOS BUILD ---
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          # Targets both Intel and Apple Silicon in a single wheel
          target: universal2-apple-darwin
          args: --release --out dist -i python3.13
          working-directory: BinaryOptionsToolsV2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: BinaryOptionsToolsV2/dist

  # --- 4. AUTOMATED RELEASE & VERSION SYNC ---
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [linux, windows, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Get Version from Cargo.toml
        id: get_version
        working-directory: BinaryOptionsToolsV2
        run: |
          # Use Python 3.11+ tomllib for reliable parsing
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('rust/Cargo.toml', 'rb'))['package']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: wheels-*
          merge-multiple: true

      - name: Sync GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.get_version.outputs.TAG }}
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          # Check if tag exists
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Updating existing release $TAG..."
            gh release upload "$TAG" wheels/*.whl --clobber
          else
            echo "Creating new release $TAG..."
            gh release create "$TAG" wheels/*.whl \
              --title "BinaryOptionsToolsV2 $VERSION" \
              --generate-notes \
              --notes "### Automated Release $TAG
              Built natively for Python 3.13."
          fi

      - name: Summary
        run: |
          echo "### blehh ill edit this if it actually works" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** macOS Sequoia / Ubuntu 24.04 / Windows 2025" >> $GITHUB_STEP_SUMMARY
          echo "- **Python:** 3.13 (Stable)" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
